services:
  # FastAPI web app on Render's native Python runtime (no Docker).
  # The Tailwind CSS is pre-built and committed (app/static/css/app.min.css),
  # so the deploy only needs `pip install`.
  - type: web
    name: priyadarshini-bus-finder
    runtime: python
    plan: free
    healthCheckPath: /api/v1/health
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: APP_SECRET_KEY
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: SCRAPER_SOURCE_URL
        value: "https://www.tickettogetlost.com/2026/06/14/ksrtc-women-free-bus-list-timings-priyadarshini-scheme-kerala/"
      - key: OSM_OVERPASS_URL
        value: "https://overpass-api.de/api/interpreter"

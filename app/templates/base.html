<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <meta name="description" content="Find Priyadarshini eligible KSRTC ordinary buses near you.">
    <link rel="manifest" href="{{ url_for('static', path='/manifest.json') }}">
    <link rel="icon" href="{{ url_for('static', path='/icons/favicon.ico') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', path='/icons/icon-192.png') }}">
    {% if settings.app_env == "development" %}
      <script src="https://cdn.tailwindcss.com"></script>
      <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}">
    {% else %}
      <link rel="stylesheet" href="{{ url_for('static', path='/css/app.min.css') }}">
    {% endif %}
    <title>{% block title %}FreeBus Kerala{% endblock %}</title>
  </head>
  <body class="min-h-screen bg-stone-50 text-slate-950 antialiased">
    {% include "partials/nav.html" %}
    <main id="main" class="mx-auto w-full max-w-6xl px-4 py-6 sm:px-6 lg:px-8">
      {% block content %}{% endblock %}
    </main>
    <footer class="border-t border-slate-200 bg-white">
      <div class="mx-auto flex max-w-6xl flex-col gap-2 px-4 py-5 text-sm text-slate-600 sm:flex-row sm:items-center sm:justify-between sm:px-6 lg:px-8">
        <p data-i18n="footer.scheme_note">Free travel on KSRTC Ordinary buses for all women and transgender persons.</p>
        <a class="font-medium text-teal-800 hover:text-teal-950" href="/scheme">Priyadarshini scheme</a>
      </div>
    </footer>
    <script src="{{ url_for('static', path='/js/i18n.js') }}" defer></script>
    <script src="{{ url_for('static', path='/js/app.js') }}" defer></script>
  </body>
</html>

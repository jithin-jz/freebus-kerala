services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: pbf_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://pbf_user:pbf_pass@postgres:5432/priyadarshini
      - DEBUG=true
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: pbf_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pbf_user
      POSTGRES_PASSWORD: pbf_pass
      POSTGRES_DB: priyadarshini
    volumes:
      - pbf_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pbf_user -d priyadarshini"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pbf_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pbf.local
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  pbf_postgres_data:
    driver: local

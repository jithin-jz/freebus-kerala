name: Test and Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: pbf_user
          POSTGRES_PASSWORD: pbf_pass
          POSTGRES_DB: priyadarshini_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply database schema
        run: |
          for migration in $(ls migrations/*.sql | sort); do
            echo "Applying $migration"
            psql postgresql://pbf_user:pbf_pass@localhost:5432/priyadarshini_test -f "$migration"
          done

      - name: Run tests
        env:
          APP_ENV: development
          DATABASE_URL: postgresql+asyncpg://pbf_user:pbf_pass@localhost:5432/priyadarshini_test
        run: pytest tests/ -v --tb=short --asyncio-mode=auto

      - name: Lint
        run: ruff check app/ scraper/ scripts/ tests/

  # Deployment is handled by Render via render.yaml on the native Python runtime
  # (auto-deploys on push to main). Configure the Render Blueprint once and set the
  # Supabase secrets in the dashboard; no build/deploy step is needed here.


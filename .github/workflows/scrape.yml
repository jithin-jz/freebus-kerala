name: Daily KSRTC Schedule Scraper

on:
  schedule:
    - cron: "30 20 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (parse but do not write to DB)"
        type: boolean
        default: false

jobs:
  scrape:
    name: Scrape tickettogetlost.com
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          APP_ENV: production
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SCRAPER_SOURCE_URL: ${{ vars.SCRAPER_SOURCE_URL }}
          SCRAPER_USER_AGENT: "PriyadarshiniBusFinder/1.0 (+https://priyadarshinibus.in/about)"
          SCRAPER_RATE_LIMIT_SECONDS: "2"
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python -m scraper.main

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Scraper failed on ${new Date().toISOString().split('T')[0]}`,
              body: `The daily schedule scraper failed. Check the workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'scraper']
            })

